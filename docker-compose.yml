version: "3.9"

services:

  mongo:
    image: mongo
    container_name: mongo
    restart: always
    volumes:
      - ./data:/data/db
      - ./mongo-init/init.js:/docker-entrypoint-initdb.d/init.js
    networks:
      - backend-net

  node-app:
    build: .
    container_name: node-frontend
    restart: always
    env_file:
      - .env
    depends_on:
      - mongo
    networks:
      - backend-net

  api-gateway:
    image: nginx:latest
    container_name: api-gateway
    ports:
      - "8080:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf
    depends_on:
      - node-frontend
    networks:
      - frontend-net
      - backend-net

networks:
  frontend-net:
  backend-net:
